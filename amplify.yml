version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
# SPA fallback: Amplify Hosting → Redirects → e.g. `/<*>` → `/index.html` (404 rewrite).
# Env: add VITE_API_BASE_URL=https://your-api.example.com under App settings → Environment.
