services:
  - type: web
    name: nanowork-frontend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_API_URL
        value: https://nanowork-backend.onrender.com
      - key: VITE_SITE_URL
        value: https://nanowork.app
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
