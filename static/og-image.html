<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      background: #000000;
      font-family: 'SF Mono', 'Monaco', 'Consolas', 'Courier New', monospace;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .logo-box {
      width: 120px;
      height: 120px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
    }

    .company-name {
      font-size: 72px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 8px;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-box">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 20L20 4M20 4H8M20 4V16" stroke="black" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"/>
      </svg>
    </div>
    <div class="company-name">NANOWORK</div>
  </div>
</body>
</html>
