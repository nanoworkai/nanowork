services:
  - type: web
    name: nanowork-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: INTERNAL_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://nanowork-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://nanowork-frontend.onrender.com,https://nanowork.app
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: AGENT_EMAIL_DOMAIN
        value: nanowork.ai
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_SCALE
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
