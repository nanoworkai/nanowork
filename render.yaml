services:
  - type: web
    name: nanowork-web
    runtime: node
    branch: main
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: cd apps/web && npm install && npm run build && cd ../.. && mkdir -p backend/public && cp -r apps/web/dist/* backend/public/ && cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: INTERNAL_TOKEN
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: cron
    name: nanowork-healthcheck
    runtime: node
    region: oregon
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: echo "no build needed"
    startCommand: |
      node -e "
        fetch('https://nanowork-web.onrender.com/health')
          .then(r => r.json())
          .then(d => {
            console.log('[healthcheck]', JSON.stringify(d));
            if (d.status !== 'ok') process.exit(1);
          })
          .catch(e => {
            console.error('[healthcheck] FAILED:', e.message);
            process.exit(1);
          });
      "

  - type: cron
    name: nanowork-keepalive
    runtime: node
    region: oregon
    plan: free
    schedule: "*/14 * * * *"
    buildCommand: echo "no build needed"
    startCommand: |
      node -e "
        fetch('https://nanowork-web.onrender.com/health')
          .then(() => console.log('[keepalive] ok', new Date().toISOString()))
          .catch(e => console.error('[keepalive] failed:', e.message));
      "
