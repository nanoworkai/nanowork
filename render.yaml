services:
  - type: web
    name: nanowork
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm ci && npm run build && cd backend && npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: INTERNAL_TOKEN
        sync: false
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: VITE_API_URL
        value: ""
      - key: VITE_SITE_URL
        value: https://nanowork.app
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://nanowork.onrender.com
      - key: CORS_ORIGIN
        value: https://nanowork.onrender.com,https://nanowork.app
