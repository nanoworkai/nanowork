services:
  - type: web
    name: nanowork-mvp
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      # Install Node.js dependencies and build frontend
      npm install
      npm run build
      # Install Python dependencies
      cd apps/api
      pip install --upgrade pip
      pip install -r requirements.txt
      # Verify uvicorn is installed
      python -m pip show uvicorn
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: apps/api
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/apps/api
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LINQ_STRIPE_SECRET_KEY
        sync: false
      - key: LINQ_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: INTERNAL_TOKEN
        sync: false
      - key: AGENT_EMAIL_DOMAIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://nanowork.app
